<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>힐링 포레스트: 아일랜드 라이프</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <header class="top-hud panel">
      <div class="brand">🌿 힐링 포레스트: 아일랜드 라이프</div>
      <div class="stats" id="statsBar"></div>
      <div class="actions">
        <button id="btnCraft">🔨 제작</button>
        <button id="btnShop">🛒 상점</button>
        <button id="btnBuild">🏗️ 건축</button>
      </div>
    </header>

    <section class="canvas-wrap panel">
      <canvas id="game" width="1280" height="720" aria-label="2D 힐링 시뮬레이션"></canvas>
      <div id="fishingUi" class="fishing-ui hidden"></div>
      <div id="message" class="message"></div>
    </section>

    <aside class="side-hud panel">
      <h2>🎒 인벤토리</h2>
      <div id="inventory" class="inventory"></div>

      <h2>📌 목표</h2>
      <div id="quest" class="quest"></div>

      <h2>🧭 조작</h2>
      <ul class="controls">
        <li>이동: WASD / 방향키</li>
        <li>상호작용: E</li>
        <li>낚시/타이밍: Space</li>
        <li>달리기: Shift</li>
        <li>인테리어 배치: F</li>
      </ul>
    </aside>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-card panel">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
      <button id="modalClose">닫기</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
