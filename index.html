<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모동 힐링 포레스트</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>🌿 모동 힐링 포레스트</h1>
      <p>방향키 또는 WASD로 천천히 산책하고, 꽃과 조개를 모아보세요.</p>
      <ul>
        <li>🌸 꽃 / 🐚 조개를 주우면 점수가 올라갑니다.</li>
        <li>🎣 호수 주변에서 낚시(스페이스)를 하면 랜덤 보상을 얻습니다.</li>
        <li>🛖 집 근처 모닥불에서 쉬면 체력이 회복됩니다.</li>
      </ul>
      <div class="stats">
        <span id="score">점수: 0</span>
        <span id="energy">에너지: 100</span>
        <span id="time">시간: 아침</span>
      </div>
      <button id="restBtn">집에서 쉬기</button>
    </section>
    <section class="game-wrap">
      <canvas id="game" width="960" height="540" aria-label="2D 힐링 게임"></canvas>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
